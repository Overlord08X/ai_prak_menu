services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: craft_food_finder_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_URL: http://localhost:8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: craft_food_finder
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - mysql
    networks:
      - craft_network

  nginx:
    image: nginx:1.27-alpine
    container_name: craft_food_finder_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - craft_network

  mysql:
    image: mysql:8.0
    container_name: craft_food_finder_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: craft_food_finder
      MYSQL_ROOT_PASSWORD: secret
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/sql:/docker-entrypoint-initdb.d
    networks:
      - craft_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: craft_food_finder_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: secret
    depends_on:
      - mysql
    networks:
      - craft_network

volumes:
  mysql_data:

networks:
  craft_network:
    driver: bridge
